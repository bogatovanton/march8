<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta name="theme-color" content="#ff6b81">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>С 8 Марта!</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffeef8 0%, #e8f4f8 100%);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .background-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 105, 180, 0.15);
            animation: float 20s infinite linear;
            will-change: transform;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            width: 90%;
            max-width: 450px;
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #fff;
            margin: 15px;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff6b81;
            font-size: 2.2rem;
            margin: 10px 0 15px 0;
            line-height: 1.2;
            word-wrap: break-word;
        }

        .subtitle {
            color: #ff8e53;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .message {
            color: #444;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            white-space: pre-line;
            word-wrap: break-word;
        }

        .flower-box {
            font-size: 4rem;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
            animation: sway 3s ease-in-out infinite;
            -webkit-animation: sway 3s ease-in-out infinite;
        }
        
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* Блок с информацией о SMS */
        .sms-info {
            background: linear-gradient(135deg, #fff5f7 0%, #f0f8ff 100%);
            border: 2px dashed #ff6b81;
            border-radius: 15px;
            padding: 20px 15px;
            margin-top: 20px;
        }

        .sms-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .sms-text {
            color: #555;
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 600;
        }

        .sms-time {
            color: #ff6b81;
            font-size: 1.3rem;
            font-weight: 700;
            display: block;
            margin-top: 8px;
        }

        .hint-text {
            font-size: 0.75rem;
            color: #999;
            margin-top: 15px;
            line-height: 1.4;
        }

        .error-screen {
            display: none;
            text-align: center;
            color: #555;
        }

        /* ========== АДАПТАЦИЯ ========== */
        
        @media (max-width: 375px) {
            .card {
                padding: 25px 15px;
                width: 95%;
                margin: 10px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .message {
                font-size: 0.9rem;
            }
            
            .flower-box {
                font-size: 3.5rem;
            }

            .sms-info {
                padding: 15px 12px;
            }

            .sms-text {
                font-size: 0.9rem;
            }

            .sms-time {
                font-size: 1.2rem;
            }
        }

        @media (min-width: 376px) and (max-width: 425px) {
            .card {
                padding: 28px 18px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .flower-box {
                font-size: 3.8rem;
            }
        }

        @media (min-width: 426px) and (max-width: 768px) {
            .card {
                padding: 35px 25px;
            }
            
            h1 {
                font-size: 2.3rem;
            }
            
            .flower-box {
                font-size: 4.2rem;
            }
        }

        @media (max-width: 320px) {
            .card {
                padding: 20px 12px;
                width: 98%;
                margin: 8px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .subtitle {
                font-size: 0.9rem;
            }
            
            .message {
                font-size: 0.85rem;
            }
            
            .flower-box {
                font-size: 3rem;
            }

            .sms-info {
                padding: 12px 10px;
            }

            .sms-text {
                font-size: 0.85rem;
            }

            .sms-time {
                font-size: 1.1rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .shape, .flower-box {
                animation: none;
            }
            
            .card {
                transition: none;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #2d1f2e 0%, #1f2d3d 100%);
            }
            
            .card {
                background: rgba(40, 40, 50, 0.95);

            }

            .sms-info {
                background: linear-gradient(135deg, #3d2f3e 0%, #2f3d4d 100%);
                border-color: #ff8ea3;
            }
            
            .message {
                color: #ddd;
            }

            .sms-text {
                color: #ccc;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
            }
            
            .card {

            }

    </style>

        function fireConfetti() {
            const duration = 2500;
            const end = Date.now() + duration;

            const colors = ['#ff6b81', '#ff8e53', '#ffd700', '#ff69b4', '#ffb6c1'];

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors,
                    disableForReducedMotion: true
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors,
                    disableForReducedMotion: true
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
